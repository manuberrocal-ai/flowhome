buyingConsiderations:
  - label: "Navigation approach and app control"
    detail: "The Q5+ uses PreciSense Precision LiDAR for mapping and custom routines. The j7+ uses PrecisionVision obstacle avoidance with Imprint Smart Mapping rather than LiDAR. Both support app-connected planning, but their navigation approaches are different."
  - label: "Cleaning type"
    detail: "Both models are vacuum-only, so choose a separate mop/vacuum combination if wet floor cleaning is a required part of your routine."
  - label: "Smart-home compatibility"
    detail: "Both profiles list Alexa, Google Home, and no required subscription."
  - label: "Verify the model details"
    detail: "Roborock describes the original Q5+ and its Auto-Empty Dock Pure at https://us.roborock.com/pages/roborock-q5. iRobot documents the j7+ navigation and dock at https://www.irobot.com/en_US/roomba-j7plus-self-emptying-robot-vacuum/J755020.html. Confirm the current listing and included dock before buying."
