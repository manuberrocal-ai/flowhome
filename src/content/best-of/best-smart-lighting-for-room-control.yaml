buyingConsiderations:
  - label: "Bulb or strip installation"
    detail: "The Philips Hue and Wyze profiles are bulbs, while Govee is an RGBIC LED strip. Match the format to the fixture or surface you want to control, and verify socket, placement, power, and mounting requirements for the exact product before buying."
  - label: "Wall-switch and always-powered behavior"
    detail: "The Hue review says wall switches should usually stay on so automations can keep working. For any room where people may cut power at a wall switch, verify the product's always-powered requirements and the household control routine before buying."
  - label: "Ecosystem and app control"
    detail: "All three profiles list Alexa, Google Home, and app control. Philips Hue also lists Apple HomeKit, while Govee and Wyze do not; match these profile fields to the platforms your household uses."
  - label: "RGB and dimming needs"
    detail: "All three profiles list RGB color and dimming. Use the comparison to review those shared fields alongside the different bulb and strip formats rather than assuming they install or control the same way."
  - label: "Catalog price context"
    detail: "The profiles list $129.99 for Philips Hue, $39.99 for Govee, and $29.98 for Wyze. These are time-sensitive catalog snapshots, so check the current listing before buying."
