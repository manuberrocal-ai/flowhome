name: Deal Detector
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
jobs:
  deals:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run deals:detect
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: chore: update deal report
          file_pattern: data/deal-report.json
