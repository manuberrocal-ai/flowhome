name: Quality Check
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run diff-check
      - run: npm test
      - run: npm run quality:check
      - run: npm run links:check
      - run: npm run build
