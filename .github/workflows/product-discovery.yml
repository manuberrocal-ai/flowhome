name: Product Discovery
on:
  schedule:
    - cron: '0 13 * * 1,4'
  workflow_dispatch:
jobs:
  discovery:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run discover:products
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: chore: update product discovery report
          file_pattern: data/product-discovery-report.json
