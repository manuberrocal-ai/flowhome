name: FlowHome Automation
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/automation.yml'
      - 'scripts/**'
      - 'src/content/**'
  schedule:
    - cron: '0 13 * * 1,4'
  workflow_dispatch:

jobs:
  automation:
    runs-on: ubuntu-latest
    env:
      PUBLIC_GTM_ID: ${{ vars.PUBLIC_GTM_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run discover:products
      - run: npm run deals:detect
      - run: npm run syndicate
        env:
          SYNDICATION_DRY_RUN: 'true'
      - run: npm run maintenance:weekly
      - run: npm run build
      - name: Upload automation reports
        uses: actions/upload-artifact@v6
        with:
          name: flowhome-automation-reports
          path: |
            data/deal-report.json
            data/quality-report.json
            data/syndication-queue.json
