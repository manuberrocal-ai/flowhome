name: Batched Deploy
on:
  schedule:
    - cron: '0 17 * * 1,4'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
      - 'docs/**'

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      PUBLIC_GTM_ID: ${{ vars.PUBLIC_GTM_ID }}
      CLOUDFLARE_API_TOKEN_VALUE: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID_VALUE: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run diff-check
      - run: npm test
      - run: npm run quality:check
      - run: npm run links:check
      - run: npm run build
      - run: npm run deploy:check
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN_VALUE != '' && env.CLOUDFLARE_ACCOUNT_ID_VALUE != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name flowhome --branch main
      - name: Upload static artifact
        uses: actions/upload-artifact@v6
        with:
          name: flowhome-dist
          path: dist
