name: Trends Monitor
on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:
jobs:
  trends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run discover:products
      - run: echo "Trends API integration is placeholder until a free/approved provider key is available."
